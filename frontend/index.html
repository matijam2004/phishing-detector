<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phishing Email Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 0.92rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      outline: none;
    }

    textarea:focus { border-color: #4f6ef7; }

    textarea::placeholder { color: #3d4464; }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover  { background: #3b56e0; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #2d3148; color: #64748b; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      margin-top: 28px;
      padding: 24px;
      border-radius: 12px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .result.phishing  { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3); }
    .result.legitimate{ background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3); }

    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .result-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .result.phishing  .result-icon { background: rgba(239,68,68,0.15); }
    .result.legitimate .result-icon { background: rgba(34,197,94,0.15); }

    .result-icon svg { width: 20px; height: 20px; }

    .result-label {
      font-size: 1.3rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .result.phishing  .result-label { color: #f87171; }
    .result.legitimate .result-label { color: #4ade80; }

    .result-confidence {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-top: 2px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }

    .bar-label {
      font-size: 0.78rem;
      color: #94a3b8;
      width: 70px;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: #2d3148;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    .bar-fill.phishing-bar  { background: #f87171; }
    .bar-fill.legit-bar     { background: #4ade80; }

    .bar-pct {
      font-size: 0.78rem;
      color: #94a3b8;
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      font-size: 0.88rem;
      color: #f87171;
      display: none;
    }

  </style>
</head>
<body>
  <div class="card">
    <h1>Phishing Email Detector</h1>
    <p class="subtitle">Paste an email below — the model will classify it instantly.</p>

    <label for="emailInput">Email text</label>
    <textarea
      id="emailInput"
      placeholder="Paste the full email text here..."
    ></textarea>

    <button id="analyzeBtn" onclick="analyze()">
      <span id="btnText">Analyze Email</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error" id="errorBox"></div>

    <div class="result" id="result">
      <div class="result-header">
        <div class="result-icon" id="resultIcon"></div>
        <div>
          <div class="result-label" id="resultLabel"></div>
          <div class="result-confidence" id="resultConfidence"></div>
        </div>
      </div>

      <div class="bar-row">
        <span class="bar-label">Phishing</span>
        <div class="bar-track">
          <div class="bar-fill phishing-bar" id="phishingBar" style="width:0%"></div>
        </div>
        <span class="bar-pct" id="phishingPct">0%</span>
      </div>

      <div class="bar-row" style="margin-top:8px">
        <span class="bar-label">Legitimate</span>
        <div class="bar-track">
          <div class="bar-fill legit-bar" id="legitBar" style="width:0%"></div>
        </div>
        <span class="bar-pct" id="legitPct">0%</span>
      </div>

    </div>
  </div>

  <script>
    const API = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
      ? "http://localhost:8000"
      : "https://phishing-detector-b32k.onrender.com";
    async function analyze() {
      const text = document.getElementById("emailInput").value.trim();
      const btn  = document.getElementById("analyzeBtn");
      const spinner  = document.getElementById("spinner");
      const btnText  = document.getElementById("btnText");
      const errorBox = document.getElementById("errorBox");
      const result   = document.getElementById("result");

      errorBox.style.display = "none";
      result.style.display   = "none";

      if (!text) {
        showError("Please paste some email text first.");
        return;
      }

      btn.disabled = true;
      btnText.style.display = "none";
      spinner.style.display = "block";

      try {
        const res  = await fetch(`${API}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Server error");
        }

        const data = await res.json();
        showResult(data);
      } catch (e) {
        if (e.name === "TypeError") {
          showError("Could not reach the backend. Make sure the server is running on port 8000.");
        } else {
          showError(e.message);
        }
      } finally {
        btn.disabled = false;
        btnText.style.display = "block";
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      const isPhishing = data.label === "phishing";
      const result = document.getElementById("result");

      result.className = `result ${data.label}`;
      document.getElementById("resultIcon").innerHTML = isPhishing
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
      document.getElementById("resultLabel").textContent = data.label;
      document.getElementById("resultConfidence").textContent =
        `Confidence: ${data.confidence}%`;

      document.getElementById("phishingBar").style.width = data.phishing_probability + "%";
      document.getElementById("legitBar").style.width    = data.legitimate_probability + "%";
      document.getElementById("phishingPct").textContent = data.phishing_probability + "%";
      document.getElementById("legitPct").textContent    = data.legitimate_probability + "%";

      result.style.display = "block";
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent    = msg;
      box.style.display  = "block";
    }

    document.getElementById("emailInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
    });
  </script>
</body>
</html>
