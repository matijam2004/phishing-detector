<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Threat Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg:      rgba(255,255,255,0.05);
      --glass-border:  rgba(255,255,255,0.09);
      --text:          #e8f4ff;
      --text-muted:    rgba(185,213,228,0.6);
      --text-dim:      rgba(185,213,228,0.3);
      --danger-light:  rgba(239,68,68,0.12);
      --success-light: rgba(34,197,94,0.12);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: #000;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(90deg, #88a7b8 0%, #b9d5e4 30%, #f3fcff 50%, #b9d5e4 70%, #88a7b8 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      animation: shimmer 8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 300% 0; }
      50%  { background-position: 0 0; }
      100% { background-position: 300% 0; }
    }

    .header-sub {
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 32px 64px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    .card-body { padding: 28px; }

    .field-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      height: 190px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: rgba(136,167,184,0.5);
      box-shadow: 0 0 0 3px rgba(136,167,184,0.08);
    }

    textarea::placeholder { color: var(--text-dim); }

    .btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(120deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      color: #ecf8ff;
      border: 1px solid rgba(215,239,255,0.28);
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.01em;
      cursor: pointer;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(227,246,255,0.5);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .btn:active:not(:disabled) { transform: scale(0.99); }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 10px;
    }

    .error-box {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--danger-light);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      font-size: 0.83rem;
      color: #fca5a5;
      display: none;
    }

    .divider {
      height: 1px;
      background: var(--glass-border);
    }

    .result-panel {
      padding: 24px 28px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: none; }
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .verdict-text { flex: 1; }

    .verdict-label {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .verdict-label.danger  { color: #f87171; }
    .verdict-label.success { color: #4ade80; }

    .verdict-conf {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .verdict-badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .verdict-badge.danger  { background: var(--danger-light);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .verdict-badge.success { background: var(--success-light); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-row:last-child { margin-bottom: 0; }

    .bar-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 68px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .bar-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
    }

    .bar-fill.danger  { background: linear-gradient(90deg, #ef4444, #f87171); }
    .bar-fill.success { background: linear-gradient(90deg, #22c55e, #4ade80); }

    .bar-pct {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      .card-body { padding: 20px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="page">
    <div class="header">
      <h1>Email Threat Detection</h1>
      <p class="header-sub">Paste any email and the model classifies it instantly using machine learning.</p>
    </div>

    <div class="card">
      <div class="card-body">
        <label class="field-label" for="emailInput">Email content</label>
        <textarea id="emailInput" placeholder="Paste the full email here — subject, sender, body..."></textarea>
        <button class="btn" id="analyzeBtn" onclick="analyze()">
          <span id="btnText">Analyze Email</span>
          <div class="spinner" id="spinner"></div>
        </button>
        <p class="hint">Ctrl + Enter to analyze</p>
        <div class="error-box" id="errorBox"></div>
      </div>

      <div class="divider" id="divider" style="display:none"></div>

      <div class="result-panel" id="resultPanel">
        <div class="result-top">
          <div class="verdict-text">
            <div class="verdict-label" id="verdictLabel"></div>
            <div class="verdict-conf" id="verdictConf"></div>
          </div>
          <div class="verdict-badge" id="verdictBadge"></div>
        </div>
        <div class="bar-row">
          <span class="bar-name">Phishing</span>
          <div class="bar-track"><div class="bar-fill danger" id="phishingBar" style="width:0%"></div></div>
          <span class="bar-pct" id="phishingPct">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-name">Legitimate</span>
          <div class="bar-track"><div class="bar-fill success" id="legitBar" style="width:0%"></div></div>
          <span class="bar-pct" id="legitPct">0%</span>
        </div>
      </div>
    </div>

    <p class="footer">Trained on 82,000+ emails &mdash; scikit-learn + FastAPI &mdash; CS166 Project</p>
  </div>

  <script>
    /* ── Exact star-field shader from cemalturkcan.com, ported to plain WebGL ── */
    (function () {
      const canvas = document.getElementById("bg-canvas");
      const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
      if (!gl) return;

      const VS = `
        attribute vec2 a_pos;
        void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
      `;

      const FS = `
        precision mediump float;
        uniform vec3  iResolution;
        uniform float iTime;
        uniform vec4  iMouse;

        #define NUM_LAYERS 4.

        mat2 Rot(float a) {
          float s = sin(a), c = cos(a);
          return mat2(c, -s, s, c);
        }

        float Star(vec2 uv, float flare) {
          float d = length(uv);
          float m = .05 / d;
          float rays = max(0., 1. - abs(uv.x * uv.y * 500.));
          m += rays * flare;
          rays = max(0., 1. - abs(uv.x * uv.y * 1000.));
          m += rays * .3 * flare;
          m *= smoothstep(1., .2, d);
          return m;
        }

        float Hash21(vec2 p) {
          p = fract(p * vec2(424.34, 342.21));
          p += dot(p, p + 34.32);
          return fract(p.x * p.y);
        }

        vec3 StarLayer(vec2 uv) {
          vec3 col = vec3(0);
          uv *= .04;
          vec2 gv = fract(uv) - .5;
          vec2 id = floor(uv);
          for (int y = -1; y <= 1; y++) {
            for (int x = -1; x <= 1; x++) {
              vec2 offs = vec2(x, y);
              float n    = Hash21(id + offs);
              float size = fract(n * 345.32);
              vec2 sp    = gv - offs - vec2(n, fract(n * 34.)) + .5;
              float star = Star(sp, smoothstep(.85, 1., size));
              vec3 color = vec3(0.49, 0.808, 0.878) * smoothstep(0.8, 1.0, size);
              star *= sin(iTime * 2.0 + n * 3.1415) * 0.3 + 0.7;
              col += star * size * color;
            }
          }
          return col;
        }

        void main() {
          vec2 fc = gl_FragCoord.xy;
          vec2 uv = (fc - .5 * iResolution.xy) / iResolution.y;
          vec2 M  = (iMouse.xy - iResolution.xy * .5) / iResolution.y;
          float t = iTime * .02;

          uv += -M * 3.;
          uv *= 2.;

          mat2 rot = Rot(t + length(uv));
          uv *= rot;

          vec3 col = vec3(0);
          for (float i = 0.; i < 1.; i += 1. / NUM_LAYERS) {
            float depth = fract(i + t);
            float scale = mix(20., .5, depth);
            float fade  = depth * smoothstep(1., .9, depth);
            col += StarLayer(uv * scale + i * 454.23 - M * 3.) * fade;
          }

          gl_FragColor = vec4(col, 1.0);
        }
      `;

      function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }

      const prog = gl.createProgram();
      gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
      gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, "a_pos");
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

      const uRes   = gl.getUniformLocation(prog, "iResolution");
      const uTime  = gl.getUniformLocation(prog, "iTime");
      const uMouse = gl.getUniformLocation(prog, "iMouse");

      let W, H, mx = 0, my = 0, start = performance.now();

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        gl.viewport(0, 0, W, H);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
      resize();

      function frame() {
        const t = (performance.now() - start) / 1000;
        gl.uniform3f(uRes, W, H, 1);
        gl.uniform1f(uTime, t);
        gl.uniform4f(uMouse, mx, H - my, 0, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(frame);
      }
      frame();
    })();

    /* ── App ── */
    const API = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
      ? "http://localhost:8000"
      : "https://phishing-detector-b32k.onrender.com";

    async function analyze() {
      const text     = document.getElementById("emailInput").value.trim();
      const btn      = document.getElementById("analyzeBtn");
      const btnText  = document.getElementById("btnText");
      const spinner  = document.getElementById("spinner");
      const errorBox = document.getElementById("errorBox");
      const panel    = document.getElementById("resultPanel");
      const divider  = document.getElementById("divider");

      errorBox.style.display = "none";
      panel.style.display    = "none";
      divider.style.display  = "none";

      if (!text) { showError("Please paste some email text first."); return; }

      btn.disabled          = true;
      btnText.textContent   = "Analyzing...";
      spinner.style.display = "block";

      try {
        const res = await fetch(`${API}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Server error"); }
        showResult(await res.json());
      } catch (e) {
        showError(e.name === "TypeError"
          ? "Could not reach the backend. Make sure the server is running."
          : e.message);
      } finally {
        btn.disabled          = false;
        btnText.textContent   = "Analyze Email";
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      const isPhishing = data.label === "phishing";
      const cls        = isPhishing ? "danger" : "success";

      document.getElementById("verdictLabel").className   = `verdict-label ${cls}`;
      document.getElementById("verdictLabel").textContent = isPhishing ? "Phishing Detected" : "Legitimate Email";
      document.getElementById("verdictConf").textContent  = `Confidence: ${data.confidence}%`;

      document.getElementById("verdictBadge").className   = `verdict-badge ${cls}`;
      document.getElementById("verdictBadge").textContent = isPhishing ? "High Risk" : "Safe";

      document.getElementById("phishingBar").style.width = data.phishing_probability + "%";
      document.getElementById("legitBar").style.width    = data.legitimate_probability + "%";
      document.getElementById("phishingPct").textContent = data.phishing_probability + "%";
      document.getElementById("legitPct").textContent    = data.legitimate_probability + "%";

      document.getElementById("divider").style.display    = "block";
      document.getElementById("resultPanel").style.display = "block";
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent   = msg;
      box.style.display = "block";
    }

    document.getElementById("emailInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
    });
  </script>
</body>
</html>
