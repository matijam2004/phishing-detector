<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Threat Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg:      rgba(255,255,255,0.04);
      --glass-border:  rgba(255,255,255,0.08);
      --text:          #f1f5f9;
      --text-muted:    rgba(255,255,255,0.4);
      --text-dim:      rgba(255,255,255,0.2);
      --danger:        #ef4444;
      --danger-light:  rgba(239,68,68,0.12);
      --success:       #22c55e;
      --success-light: rgba(34,197,94,0.12);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: #07070f;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.45) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Glass card ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 32px 64px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .card-body { padding: 28px; }

    /* ── Textarea ── */
    .field-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      height: 190px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    textarea::placeholder { color: var(--text-dim); }

    /* ── Button ── */
    .btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(99,102,241,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 4px 32px rgba(99,102,241,0.45);
    }

    .btn:active:not(:disabled) { transform: scale(0.99); }

    .btn:disabled {
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 10px;
    }

    /* ── Error ── */
    .error-box {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--danger-light);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      font-size: 0.83rem;
      color: #fca5a5;
      display: none;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--glass-border);
    }

    /* ── Result ── */
    .result-panel {
      padding: 24px 28px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: none; }
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .verdict-text { flex: 1; }

    .verdict-label {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .verdict-label.danger  { color: #f87171; }
    .verdict-label.success { color: #4ade80; }

    .verdict-conf {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .verdict-badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .verdict-badge.danger  { background: var(--danger-light);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .verdict-badge.success { background: var(--success-light); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

    /* Bars */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-row:last-child { margin-bottom: 0; }

    .bar-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 68px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .bar-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
    }

    .bar-fill.danger  { background: linear-gradient(90deg, #ef4444, #f87171); }
    .bar-fill.success { background: linear-gradient(90deg, #22c55e, #4ade80); }

    .bar-pct {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      .card-body { padding: 20px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="page">

    <div class="header">
      <h1>Email Threat Detection</h1>
      <p class="header-sub">Paste any email — the model classifies it instantly using machine learning.</p>
    </div>

    <div class="card">
      <div class="card-body">
        <label class="field-label" for="emailInput">Email content</label>
        <textarea
          id="emailInput"
          placeholder="Paste the full email here — subject, sender, body..."
        ></textarea>
        <button class="btn" id="analyzeBtn" onclick="analyze()">
          <span id="btnText">Analyze Email</span>
          <div class="spinner" id="spinner"></div>
        </button>
        <p class="hint">Ctrl + Enter to analyze</p>
        <div class="error-box" id="errorBox"></div>
      </div>

      <div class="divider" id="divider" style="display:none"></div>

      <div class="result-panel" id="resultPanel">
        <div class="result-top">
          <div class="verdict-text">
            <div class="verdict-label" id="verdictLabel"></div>
            <div class="verdict-conf" id="verdictConf"></div>
          </div>
          <div class="verdict-badge" id="verdictBadge"></div>
        </div>

        <div class="bar-row">
          <span class="bar-name">Phishing</span>
          <div class="bar-track"><div class="bar-fill danger" id="phishingBar" style="width:0%"></div></div>
          <span class="bar-pct" id="phishingPct">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-name">Legitimate</span>
          <div class="bar-track"><div class="bar-fill success" id="legitBar" style="width:0%"></div></div>
          <span class="bar-pct" id="legitPct">0%</span>
        </div>
      </div>
    </div>

    <p class="footer">Trained on 82,000+ emails &nbsp; scikit-learn + FastAPI &nbsp; CS166 Project</p>
  </div>

  <script>
    /* ── Particle network background ── */
    (function () {
      const canvas = document.getElementById("bg-canvas");
      const ctx    = canvas.getContext("2d");

      let W, H, particles;

      const COUNT      = 90;
      const MAX_DIST   = 140;
      const SPEED      = 0.35;
      const COLOR_A    = [99, 102, 241];   // indigo
      const COLOR_B    = [139, 92,  246];  // violet
      const COLOR_C    = [6,  182, 212];   // cyan

      function lerp(a, b, t) { return a + (b - a) * t; }
      function lerpColor(c1, c2, t) {
        return [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];
      }

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function makeParticle() {
        const t  = Math.random();
        const c  = t < 0.5 ? lerpColor(COLOR_A, COLOR_B, t * 2) : lerpColor(COLOR_B, COLOR_C, (t - 0.5) * 2);
        return {
          x:  Math.random() * W,
          y:  Math.random() * H,
          vx: (Math.random() - 0.5) * SPEED,
          vy: (Math.random() - 0.5) * SPEED,
          r:  Math.random() * 1.5 + 0.5,
          c,
        };
      }

      function init() {
        resize();
        particles = Array.from({ length: COUNT }, makeParticle);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;

          for (let j = i + 1; j < particles.length; j++) {
            const q  = particles[j];
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const d  = Math.sqrt(dx * dx + dy * dy);
            if (d > MAX_DIST) continue;

            const alpha = (1 - d / MAX_DIST) * 0.35;
            const mc    = lerpColor(p.c, q.c, 0.5);
            ctx.beginPath();
            ctx.strokeStyle = `rgba(${mc[0]|0},${mc[1]|0},${mc[2]|0},${alpha})`;
            ctx.lineWidth   = 0.8;
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.stroke();
          }

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${p.c[0]|0},${p.c[1]|0},${p.c[2]|0},0.7)`;
          ctx.fill();
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener("resize", () => { resize(); });
      init();
      draw();
    })();

    /* ── App logic ── */
    const API = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
      ? "http://localhost:8000"
      : "https://phishing-detector-b32k.onrender.com";

    async function analyze() {
      const text     = document.getElementById("emailInput").value.trim();
      const btn      = document.getElementById("analyzeBtn");
      const btnText  = document.getElementById("btnText");
      const spinner  = document.getElementById("spinner");
      const errorBox = document.getElementById("errorBox");
      const panel    = document.getElementById("resultPanel");
      const divider  = document.getElementById("divider");

      errorBox.style.display = "none";
      panel.style.display    = "none";
      divider.style.display  = "none";

      if (!text) { showError("Please paste some email text first."); return; }

      btn.disabled          = true;
      btnText.textContent   = "Analyzing...";
      spinner.style.display = "block";

      try {
        const res = await fetch(`${API}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Server error"); }
        showResult(await res.json());
      } catch (e) {
        showError(e.name === "TypeError"
          ? "Could not reach the backend. Make sure the server is running."
          : e.message);
      } finally {
        btn.disabled          = false;
        btnText.textContent   = "Analyze Email";
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      const isPhishing = data.label === "phishing";
      const cls        = isPhishing ? "danger" : "success";

      document.getElementById("verdictLabel").className   = `verdict-label ${cls}`;
      document.getElementById("verdictLabel").textContent = isPhishing ? "Phishing Detected" : "Legitimate Email";
      document.getElementById("verdictConf").textContent  = `Confidence: ${data.confidence}%`;

      document.getElementById("verdictBadge").className   = `verdict-badge ${cls}`;
      document.getElementById("verdictBadge").textContent = isPhishing ? "High Risk" : "Safe";

      document.getElementById("phishingBar").style.width = data.phishing_probability + "%";
      document.getElementById("legitBar").style.width    = data.legitimate_probability + "%";
      document.getElementById("phishingPct").textContent = data.phishing_probability + "%";
      document.getElementById("legitPct").textContent    = data.legitimate_probability + "%";

      document.getElementById("divider").style.display    = "block";
      document.getElementById("resultPanel").style.display = "block";
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent   = msg;
      box.style.display = "block";
    }

    document.getElementById("emailInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
    });
  </script>
</body>
</html>
