<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Threat Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg:      rgba(255,255,255,0.04);
      --glass-border:  rgba(255,255,255,0.08);
      --text:          #f1f5f9;
      --text-muted:    rgba(255,255,255,0.4);
      --text-dim:      rgba(255,255,255,0.2);
      --accent:        #6366f1;
      --danger:        #ef4444;
      --danger-light:  rgba(239,68,68,0.15);
      --success:       #22c55e;
      --success-light: rgba(34,197,94,0.15);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    body { background: #060612; }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-mesh {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,102,241,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(139,92,246,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 60% 10%, rgba(6,182,212,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 10% 80%, rgba(59,130,246,0.14) 0%, transparent 55%);
      animation: meshDrift 12s ease-in-out infinite alternate;
    }

    .bg-mesh-2 {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 40%, rgba(168,85,247,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 30% 70%, rgba(99,102,241,0.1) 0%, transparent 60%);
      animation: meshDrift 16s ease-in-out infinite alternate-reverse;
    }

    @keyframes meshDrift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.03); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
      100% { transform: translate(20px, 10px) scale(1.02); }
    }

    /* Subtle grid overlay */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── Glass card ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 32px 64px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .card-body { padding: 28px; }

    /* ── Textarea ── */
    .field-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      height: 190px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }

    textarea::placeholder { color: var(--text-dim); }

    /* ── Button ── */
    .btn {
      margin-top: 14px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(99,102,241,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 4px 32px rgba(99,102,241,0.45);
    }

    .btn:active:not(:disabled) { transform: scale(0.99); }

    .btn:disabled {
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn svg { width: 15px; height: 15px; }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 10px;
    }

    /* ── Error ── */
    .error-box {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--danger-light);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      font-size: 0.83rem;
      color: #fca5a5;
      display: none;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--glass-border);
      margin: 0;
    }

    /* ── Result ── */
    .result-panel {
      padding: 24px 28px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: none; }
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .verdict-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .verdict-icon svg { width: 20px; height: 20px; }

    .verdict-icon.danger  { background: var(--danger-light);  border: 1px solid rgba(239,68,68,0.2); }
    .verdict-icon.success { background: var(--success-light); border: 1px solid rgba(34,197,94,0.2); }

    .verdict-text { flex: 1; }

    .verdict-label {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .verdict-label.danger  { color: #f87171; }
    .verdict-label.success { color: #4ade80; }

    .verdict-conf {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .verdict-badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .verdict-badge.danger  { background: var(--danger-light);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .verdict-badge.success { background: var(--success-light); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }

    /* Bars */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-row:last-child { margin-bottom: 0; }

    .bar-name {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 68px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .bar-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
    }

    .bar-fill.danger  { background: linear-gradient(90deg, #ef4444, #f87171); }
    .bar-fill.success { background: linear-gradient(90deg, #22c55e, #4ade80); }

    .bar-pct {
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 40px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      .card-body { padding: 20px; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg">
    <div class="bg-mesh"></div>
    <div class="bg-mesh-2"></div>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <h1>Email Threat Detection</h1>
      <p class="header-sub">Paste any email — the model classifies it instantly using machine learning.</p>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-body">
        <label class="field-label" for="emailInput">Email content</label>
        <textarea
          id="emailInput"
          placeholder="Paste the full email here — subject, sender, body..."
        ></textarea>
        <button class="btn" id="analyzeBtn" onclick="analyze()">
          <svg id="btnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span id="btnText">Analyze Email</span>
          <div class="spinner" id="spinner"></div>
        </button>
        <p class="hint">Ctrl + Enter to analyze</p>
        <div class="error-box" id="errorBox"></div>
      </div>

      <div class="divider" id="divider" style="display:none"></div>

      <div class="result-panel" id="resultPanel">
        <div class="result-top">
          <div class="verdict-icon" id="verdictIcon"></div>
          <div class="verdict-text">
            <div class="verdict-label" id="verdictLabel"></div>
            <div class="verdict-conf" id="verdictConf"></div>
          </div>
          <div class="verdict-badge" id="verdictBadge"></div>
        </div>

        <div class="bar-row">
          <span class="bar-name">Phishing</span>
          <div class="bar-track"><div class="bar-fill danger" id="phishingBar" style="width:0%"></div></div>
          <span class="bar-pct" id="phishingPct">0%</span>
        </div>
        <div class="bar-row">
          <span class="bar-name">Legitimate</span>
          <div class="bar-track"><div class="bar-fill success" id="legitBar" style="width:0%"></div></div>
          <span class="bar-pct" id="legitPct">0%</span>
        </div>
      </div>
    </div>

    <p class="footer">Trained on 82,000+ emails &nbsp; scikit-learn + FastAPI &nbsp; CS166 Project</p>
  </div>

  <script>
    const API = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
      ? "http://localhost:8000"
      : "https://phishing-detector-b32k.onrender.com";

    async function analyze() {
      const text     = document.getElementById("emailInput").value.trim();
      const btn      = document.getElementById("analyzeBtn");
      const btnText  = document.getElementById("btnText");
      const btnIcon  = document.getElementById("btnIcon");
      const spinner  = document.getElementById("spinner");
      const errorBox = document.getElementById("errorBox");
      const panel    = document.getElementById("resultPanel");
      const divider  = document.getElementById("divider");

      errorBox.style.display = "none";
      panel.style.display    = "none";
      divider.style.display  = "none";

      if (!text) { showError("Please paste some email text first."); return; }

      btn.disabled          = true;
      btnText.textContent   = "Analyzing...";
      btnIcon.style.display = "none";
      spinner.style.display = "block";

      try {
        const res = await fetch(`${API}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Server error"); }
        showResult(await res.json());
      } catch (e) {
        showError(e.name === "TypeError"
          ? "Could not reach the backend. Make sure the server is running."
          : e.message);
      } finally {
        btn.disabled          = false;
        btnText.textContent   = "Analyze Email";
        btnIcon.style.display = "block";
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      const isPhishing = data.label === "phishing";
      const cls        = isPhishing ? "danger" : "success";

      document.getElementById("verdictIcon").className = `verdict-icon ${cls}`;
      document.getElementById("verdictIcon").innerHTML = isPhishing
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;

      document.getElementById("verdictLabel").className   = `verdict-label ${cls}`;
      document.getElementById("verdictLabel").textContent = isPhishing ? "Phishing Detected" : "Legitimate Email";
      document.getElementById("verdictConf").textContent  = `Confidence: ${data.confidence}%`;

      document.getElementById("verdictBadge").className   = `verdict-badge ${cls}`;
      document.getElementById("verdictBadge").textContent = isPhishing ? "High Risk" : "Safe";

      document.getElementById("phishingBar").style.width = data.phishing_probability + "%";
      document.getElementById("legitBar").style.width    = data.legitimate_probability + "%";
      document.getElementById("phishingPct").textContent = data.phishing_probability + "%";
      document.getElementById("legitPct").textContent    = data.legitimate_probability + "%";

      document.getElementById("divider").style.display    = "block";
      document.getElementById("resultPanel").style.display = "block";
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent   = msg;
      box.style.display = "block";
    }

    document.getElementById("emailInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
    });
  </script>
</body>
</html>
